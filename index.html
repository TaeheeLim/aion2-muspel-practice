<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>무스펠의 성배 — 신호등 연습</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#171b25; --panel2:#1d2230; --line:#2a3142;
    --txt:#e8ecf4; --muted:#8b95a8; --accent:#ff7a18; --accent2:#ffb454;
    --red:#ff4d5e; --green:#27d97a; --blue:#4db5ff; --yellow:#ffd23f;
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Pretendard","Segoe UI",system-ui,-apple-system,"Malgun Gothic",sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #1a1410 0%, var(--bg) 55%);
    color:var(--txt);min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:14px 10px 20px;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:900px;display:flex;flex-direction:column;gap:10px;}

  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 14px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);}
  .topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px;display:flex;gap:8px;align-items:center;}
  .topbar h1 .flame{filter:drop-shadow(0 0 8px var(--accent));}
  .spacer{flex:1;}
  .mini{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:700;}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .btn{border:none;border-radius:11px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;transition:.13s;letter-spacing:.3px;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),#e0640d);color:#fff;box-shadow:0 6px 18px rgba(255,122,24,.4);}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:10px 14px;}

  .stage{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:10px;display:flex;justify-content:center;}
  .over{position:absolute;inset:10px;border-radius:12px;background:rgba(10,8,6,.82);backdrop-filter:blur(2px);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;text-align:center;padding:20px;}
  .over.show{display:flex;}
  .over h2{font-size:30px;font-weight:900;color:var(--red);letter-spacing:1px;text-shadow:0 0 20px rgba(255,77,94,.5);}
  .over p{color:var(--muted);font-size:14px;}
  canvas{width:100%;max-width:820px;aspect-ratio:1/1;border-radius:12px;display:block;touch-action:none;cursor:crosshair;
    background:radial-gradient(circle at 50% 50%, #15110d 0%, #0c0e13 72%);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1><span class="flame">🔥</span> 무스펠의 성배 — 신호등 연습</h1>
    <div class="spacer"></div>
    <label class="mini">시작 위치
      <select id="clock">
        <option value="12">12시</option><option value="1">1시 (두 줄)</option><option value="2">2시</option>
        <option value="3">3시</option><option value="4" selected>4시 (두 줄)</option><option value="5">5시</option>
        <option value="6">6시</option><option value="7">7시 (두 줄)</option><option value="8">8시</option>
        <option value="9">9시</option><option value="10">10시 (두 줄)</option><option value="11">11시</option>
      </select>
    </label>
    <button class="btn primary" id="startBtn">▶ 시작</button>
    <button class="btn ghost" id="resetBtn">↺</button>
  </div>
  <div class="stage">
    <canvas id="cv" width="820" height="820"></canvas>
    <div class="over" id="over">
      <h2>게임 실패</h2>
      <p>잘못된 색 구슬 2개가 보스에 들어갔습니다.</p>
      <button class="btn primary" id="retryBtn">▶ 다시 시작</button>
    </div>
  </div>
</div>

      g.gain.exponentialRampToValueAtTime(.0001,tt+d);o.stop(tt+d);}catch(e){}
  }
  function boom(){ if(!G.sound)return;
    try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const n=actx.sampleRate*.3,buf=actx.createBuffer(1,n,actx.sampleRate),dt=buf.getChannelData(0);
      for(let i=0;i<n;i++)dt[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
      const src=actx.createBufferSource();src.buffer=buf;const g=actx.createGain();g.gain.value=.32;
      const f=actx.createBiquadFilter();f.type="lowpass";f.frequency.value=900;
      src.connect(f);f.connect(g);g.connect(actx.destination);src.start();}catch(e){}
  }
  const sOk=()=>{tone(880,.07,"triangle",.16);setTimeout(()=>tone(1240,.08,"triangle",.14),55);};
  const sBad=()=>tone(140,.25,"sawtooth",.2);
  const sCast=()=>tone(360,.06,"sine",.09);

  // ---------- sizing ----------
  function resize(){
    const r=cv.getBoundingClientRect(); S=Math.round(r.width)||820; DPR=Math.min(window.devicePixelRatio||1,2);
    cv.width=S*DPR; cv.height=S*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=S/2; cy=S/2; arenaR=S*0.46; bossR=S*0.08;
    ringR[0]=bossR+S*0.060; ringR[1]=bossR+S*0.038; ringR[2]=bossR+S*0.018;
    if(!G.running){ G.player.x=cx; G.player.y=cy+arenaR*0.6; }
  }
  window.addEventListener("resize",resize);
  function placePlayerAtClock(clock){ const a=clockAngle(clock); G.player.x=cx+Math.cos(a)*arenaR*0.7; G.player.y=cy+Math.sin(a)*arenaR*0.7; }

  // ---------- rounds ----------
  function newRings(){ // 빨/초/파 무작위지만 반드시 서로 다른 3색(순열)
    const a=[0,1,2]; for(let i=2;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];} G.rings=a; G.ringGone=[false,false,false]; }
  function removeRing(c){ // 들어간 구슬 색과 같은 색의 테두리를 하나 제거
    for(let i=0;i<3;i++){ if(!G.ringGone[i] && G.rings[i]===c){ G.ringGone[i]=true; G.fx.push({type:"ring",r:ringR[i],col:COL[c].hex,t:0}); return; } } }
  // 이 레인(1~2열)이 3·5·7회 폭발 스케줄 안에서 테두리 색으로 맞춰질 수 있는지 검사.
  // 폭발마다 한 열만 칠하거나(또는 비조준) 가능 → (열수+1)^7 조합 완전탐색.
  function laneSolvable(cols){
    const n=cols.length, choices=n+1, total=Math.pow(choices,7);
    const need=cols.map(c=>c.orbs.map(o=>(((G.rings[o.tr]-o.cidx)%3)+3)%3));
    for(let mask=0; mask<total; mask++){
      let m=mask; const a=[]; for(let e=0;e<7;e++){a.push(m%choices);m=(m/choices)|0;}
      let ok=true;
      for(let ci=0; ci<n && ok; ci++){
        for(const o of cols[ci].orbs){
          let h=0; for(let e=0;e<COMMIT[o.tr];e++) if(a[e]===ci+1) h++;
          if(h%3!==need[ci][o.tr]){ ok=false; break; }
        }
      }
      if(ok) return true;
    }
    return false;
  }
  function spawnLane(clock){
    const base=clockAngle(clock);
    const cnt=DOUBLE_CLOCKS.has(((clock%12)+12)%12||12)?2:1;
    const id=G.laneSeq++;
    let cols, tries=0;
    do{
      cols=[];
      for(let c=0;c<cnt;c++){
        const ang=base+(cnt===1?0:(c===0?-COL_OFFSET:COL_OFFSET));
        let cc; do{ cc=[rand(3),rand(3),rand(3)]; }while(cc[0]===cc[1]&&cc[1]===cc[2]); // 3개 모두 같은 색 금지(최소 2색)
        const orbs=cc.map((v,i)=>({cidx:v,tr:i,committed:false,entering:false,enterT:0}));
        cols.push({laneId:id, clock, ang, exp:0, orbs, alive:true});
      }
      tries++;
    }while(!laneSolvable(cols) && tries<400); // 스케줄 안에 색을 맞출 수 있는 조합만 사용
    cols.forEach(c=>G.cols.push(c));
  }
  function laneCount(){ const s=new Set(); G.cols.forEach(c=>{if(c.alive)s.add(c.laneId);}); return s.size; }
  function armFrac(){ return G.beam? clamp(G.beam.t/ARM_TIME,0,1):0; }
  function orbRad(col,orb){
    if(orb.entering) return lerp(arrival(), bossR*0.25, clamp(orb.enterT/ENTER_DELAY,0,1));
    const eff=col.exp+armFrac();
    return lerp(spawnRadFor(orb.tr), arrival(), clamp(eff/COMMIT[orb.tr],0,1));
  }
  function angDiff(a,b){ let d=a-b; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU; return d; }

  // ---------- beam ----------
  function explode(){
    const b=G.beam;
    let tgt=null,best=BEAM_TOL;
    for(const col of G.cols){ if(!col.alive)continue; const d=Math.abs(angDiff(col.ang,b.ang)); if(d<=best){best=d;tgt=col;} }
    if(tgt){ // 보스→캐릭터→가장자리 직선이 지나는 '한 줄' 전체(진입 중 아닌 구슬)만 색 변경
      tgt.orbs.forEach(o=>{ if(!o.committed && !o.entering) o.cidx=(o.cidx+1)%3; });
    }
    boom(); G.fx.push({type:"boom",ang:b.ang,len:arenaR,t:0});
    // 폭발 누적 증가 → 임계치 도달 구슬은 '진입 시작'(색 고정, 1초 뒤 실제 진입)
    for(const col of G.cols){ if(!col.alive)continue; col.exp++;
      for(const o of col.orbs){ if(!o.committed && !o.entering && col.exp>=COMMIT[o.tr]){ o.entering=true; o.enterT=0; } }
    }
    G.beam=null;
  }
  function commitOrb(col,o){
    o.committed=true;
    const want=G.rings[o.tr], px=cx+Math.cos(col.ang)*bossR*0.4, py=cy+Math.sin(col.ang)*bossR*0.4;
    if(o.cidx===want){ sOk(); G.fx.push({type:"hit",x:px,y:py,t:0,ok:true}); removeRing(o.cidx); }
    else { sBad(); G.fx.push({type:"hit",x:px,y:py,t:0,ok:false}); G.wrong++;
      if(G.wrong>=2) gameOver(); else removeRing(o.cidx); }
  }

  // ---------- loop ----------
  const keys=new Set();
  function update(dt){
    // movement (속도 축소)
    const sp=arenaR*0.8*dt; let vx=0,vy=0;
    if(keys.has("ArrowUp")||keys.has("w")||keys.has("W"))vy-=1;
    if(keys.has("ArrowDown")||keys.has("s")||keys.has("S"))vy+=1;
    if(keys.has("ArrowLeft")||keys.has("a")||keys.has("A"))vx-=1;
    if(keys.has("ArrowRight")||keys.has("d")||keys.has("D"))vx+=1;
    if(vx||vy){const m=Math.hypot(vx,vy);G.player.x+=vx/m*sp;G.player.y+=vy/m*sp;}
    let pdx=G.player.x-cx,pdy=G.player.y-cy,pd=Math.hypot(pdx,pdy)||1;
    const minD=bossR+S*0.03,maxD=arenaR;
    if(pd<minD){G.player.x=cx+pdx/pd*minD;G.player.y=cy+pdy/pd*minD;}
    if(pd>maxD){G.player.x=cx+pdx/pd*maxD;G.player.y=cy+pdy/pd*maxD;}

    // single-lane practice respawn
    if(laneCount()===0){ if(G.respawn<=0)G.respawn=0.9; G.respawn-=dt; if(G.respawn<=0){ newRings(); spawnLane(G.clock);} }

    // 장판: 캐릭터에 붙어 따라오며 차오르다, 거의 꽉 차면(LOCK_FRAC) 분리·고정되어 폭발
    if(G.cols.some(c=>c.alive)){
      const pa=Math.atan2(G.player.y-cy,G.player.x-cx);
      if(!G.beam) G.beam={t:0,ang:pa,locked:false};
      const b=G.beam;
      b.t+=dt;
      if(!b.locked){
        // 가까운 줄에 자석처럼 정렬 → 조준이 살짝 어긋나도 그 줄 3개 모두 확실히 변경. 멀면 캐릭터 각도(=비우기)
        let bb=BEAM_TOL, snap=null;
        for(const col of G.cols){ if(!col.alive)continue; const dd=Math.abs(angDiff(col.ang,pa)); if(dd<bb){bb=dd;snap=col.ang;} }
        b.ang = (snap!==null)?snap:pa;
        if(b.t>=LOCK_FRAC*ARM_TIME){ b.locked=true; sCast(); }
      }
      if(b.t>=ARM_TIME) explode();
    } else G.beam=null;

    // entering orbs glide into boss, commit after ENTER_DELAY
    for(const col of G.cols){ if(!col.alive)continue;
      for(const o of col.orbs){ if(o.entering && !o.committed){ o.enterT+=dt; if(o.enterT>=ENTER_DELAY) commitOrb(col,o); } }
      col.orbs=col.orbs.filter(o=>!o.committed);
      if(col.orbs.length===0) col.alive=false;
    }
    G.cols=G.cols.filter(c=>c.alive);

    for(const f of G.fx) f.t+=dt;
    G.fx=G.fx.filter(f=>f.t<(f.type==="boom"?0.5:0.7));
  }

  // ---------- render ----------
  function render(){
    ctx.clearRect(0,0,S,S);
    // arena + clock labels
    ctx.save();
    ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,cy,arenaR,0,TAU);ctx.stroke();
    ctx.fillStyle="rgba(160,170,190,0.32)";ctx.font=`${Math.round(S*0.024)}px sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    for(let h=1;h<=12;h++){const d=clockDir(h);ctx.fillText(h+"시",cx+d.x*arenaR,cy+d.y*arenaR);}
    ctx.restore();

    // beam (장판): 캐릭터를 따라가다 거의 꽉 차면 분리·고정 후 폭발. 그라데이션이 점점 진해짐
    if(G.beam){ const b=G.beam, w=S*BEAM_WF, len=arenaR, prog=clamp(b.t/ARM_TIME,0,1);
      ctx.save();ctx.translate(cx,cy);ctx.rotate(b.ang);
      const r=Math.round(255+(150-255)*prog),gC=Math.round(175+(12-175)*prog),bC=Math.round(80+(8-80)*prog);
      const a=0.18+prog*0.66;
      const grad=ctx.createLinearGradient(0,0,len,0);
      grad.addColorStop(0,`rgba(${r},${gC},${bC},${a})`);grad.addColorStop(0.80,`rgba(${r},${gC},${bC},${a*0.85})`);grad.addColorStop(1,`rgba(${r},${gC},${bC},0)`);
      const pulse=prog>0.72?1+0.10*Math.sin(b.t*38):1;
      ctx.shadowColor=`rgba(${r},${gC},${bC},${a})`;ctx.shadowBlur=prog*16;
      ctx.fillStyle=grad;ctx.fillRect(0,-w/2*pulse,len,w*pulse);ctx.shadowBlur=0;
      ctx.setLineDash(b.locked?[]:[9,9]); // 분리(고정) 전엔 점선, 분리 후 실선
      ctx.strokeStyle=`rgba(255,${Math.round(120-prog*90)},40,${0.5+prog*0.5})`;ctx.lineWidth=2+prog*2;ctx.strokeRect(0,-w/2,len,w);
      ctx.setLineDash([]);
      ctx.fillStyle=`rgba(255,235,160,${0.3+prog*0.5})`;
      ctx.fillRect(0,-w*0.5,len*prog,w*0.12);ctx.fillRect(0,w*0.5-w*0.12,len*prog,w*0.12);
      ctx.restore();
    }
    for(const f of G.fx){ if(f.type!=="boom")continue; const p=f.t/0.5, w=S*BEAM_WF, len=arenaR;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(f.ang);
      ctx.fillStyle=`rgba(255,210,120,${(1-p)*0.55})`;ctx.fillRect(0,-w/2*(1+p),len,w*(1+p));ctx.restore();
    }

    // boss rings (사라진 것은 제외) + core
    for(let i=0;i<3;i++){ if(G.ringGone[i])continue; const col=COL[G.rings[i]];
      ctx.beginPath();ctx.arc(cx,cy,ringR[i],0,TAU);ctx.strokeStyle=col.hex;ctx.lineWidth=S*0.013;
      ctx.shadowColor=col.hex;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;}
    // ring vanish fx
    for(const f of G.fx){ if(f.type!=="ring")continue; const p=clamp(f.t/0.6,0,1);
      ctx.save();ctx.globalAlpha=1-p;ctx.beginPath();ctx.arc(cx,cy,f.r*(1+p*0.14),0,TAU);
      ctx.strokeStyle=f.col;ctx.lineWidth=S*0.013*(1-p)+1;ctx.shadowColor=f.col;ctx.shadowBlur=16*(1-p);ctx.stroke();ctx.restore();}
    ctx.save();
    ctx.beginPath();ctx.arc(cx,cy,bossR,0,TAU);ctx.clip();
    if(bossReady){ ctx.drawImage(bossImg, cx-bossR, cy-bossR, bossR*2, bossR*2); }
    else { const bgr=ctx.createRadialGradient(cx-bossR*0.3,cy-bossR*0.3,bossR*0.2,cx,cy,bossR);
      bgr.addColorStop(0,"#5a1e0a");bgr.addColorStop(1,"#1a0d06");ctx.fillStyle=bgr;ctx.fillRect(cx-bossR,cy-bossR,bossR*2,bossR*2); }
    ctx.restore();
    ctx.beginPath();ctx.arc(cx,cy,bossR,0,TAU);ctx.strokeStyle="#2a1408";ctx.lineWidth=2.5;ctx.stroke();

    // explosion-count HUD
    const prim=G.cols.find(c=>c.alive&&c.orbs.some(o=>!o.entering)) || G.cols.find(c=>c.alive);
    if(prim){ const next=prim.orbs.find(o=>!o.entering)||prim.orbs[0];
      ctx.textAlign="center";
      ctx.fillStyle="rgba(255,210,150,0.9)";ctx.font=`bold ${Math.round(S*0.028)}px sans-serif`;
      ctx.fillText(`폭발 ${prim.exp}/7`,cx,cy+bossR+S*0.07);
      if(next){ const left=Math.max(0,COMMIT[next.tr]-prim.exp);
        ctx.fillStyle="rgba(180,190,210,0.7)";ctx.font=`${Math.round(S*0.022)}px sans-serif`;
        ctx.fillText(`다음 진입: ${next.tr+1}번 구슬 (폭발 ${left}회 후)`,cx,cy+bossR+S*0.10);
      }
    }

    // orbs (작게)
    const orad=S*0.018;
    for(const col of G.cols){ if(!col.alive)continue;
      for(const o of col.orbs){ const c0=COL[o.cidx], rad=orbRad(col,o);
        const x=cx+Math.cos(col.ang)*rad, y=cy+Math.sin(col.ang)*rad;
        const sc=o.entering?lerp(1,0.5,clamp(o.enterT/ENTER_DELAY,0,1)):1;
        ctx.beginPath();ctx.arc(x,y,orad*sc,0,TAU);
        const gg=ctx.createRadialGradient(x-orad*0.3,y-orad*0.3,orad*0.2,x,y,orad*sc);
        gg.addColorStop(0,"#fff");gg.addColorStop(0.25,c0.hex);gg.addColorStop(1,c0.hex);
        ctx.fillStyle=gg;ctx.shadowColor=c0.hex;ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
        ctx.strokeStyle="rgba(0,0,0,.5)";ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle="rgba(0,0,0,.7)";ctx.font=`bold ${Math.round(orad*sc)}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(String(o.tr+1),x,y);
      }
    }
    for(const f of G.fx){ if(f.type!=="hit")continue; const p=f.t/0.7;
      ctx.beginPath();ctx.arc(f.x,f.y,orad+p*S*0.05,0,TAU);
      ctx.strokeStyle=f.ok?`rgba(39,217,122,${1-p})`:`rgba(255,77,94,${1-p})`;ctx.lineWidth=4*(1-p)+1;ctx.stroke();
      if(!f.ok){ctx.fillStyle=`rgba(255,77,94,${1-p})`;ctx.font=`bold ${Math.round(S*0.04)}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("✕",f.x,f.y);}
    }

    // target legend (top-left, on-canvas) — 보스 테두리 색(바깥→안쪽 = 1·2·3번 구슬)
    const lx=S*0.03, ly=S*0.03, sw=S*0.03, gap=S*0.046;
    ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillStyle="rgba(180,190,210,0.8)";ctx.font=`bold ${Math.round(S*0.02)}px sans-serif`;
    ctx.fillText("테두리(바깥→안쪽)",lx,ly);
    for(let i=0;i<3;i++){ const col=COL[G.rings[i]], yy=ly+gap*(i+1), gone=G.ringGone[i];
      ctx.save(); ctx.globalAlpha=gone?0.32:1;
      ctx.beginPath();ctx.arc(lx+sw/2,yy,sw/2,0,TAU);ctx.fillStyle=col.hex;ctx.shadowColor=col.hex;ctx.shadowBlur=gone?0:8;ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle="rgba(220,225,235,0.85)";ctx.font=`${Math.round(S*0.02)}px sans-serif`;
      ctx.fillText(`${i+1}번 구슬 = ${col.name}`+(gone?"  ✓":""),lx+sw+S*0.012,yy);
      ctx.restore();
    }

    // player + aim line
    const pdx=G.player.x-cx,pdy=G.player.y-cy,pang=Math.atan2(pdy,pdx),plen=Math.hypot(pdx,pdy);
    ctx.save();ctx.setLineDash([6,7]);ctx.strokeStyle="rgba(255,180,90,0.3)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(pang)*arenaR,cy+Math.sin(pang)*arenaR);ctx.stroke();ctx.restore();
    ctx.beginPath();ctx.arc(G.player.x,G.player.y,S*0.014,0,TAU);
    const pg=ctx.createRadialGradient(G.player.x-3,G.player.y-3,1.5,G.player.x,G.player.y,S*0.014);
    pg.addColorStop(0,"#fff6e6");pg.addColorStop(1,"#ff7a18");
    ctx.fillStyle=pg;ctx.shadowColor="#ff7a18";ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
  }

  function frame(t){ if(!G.running)return; const dt=Math.min(0.05,(t-G.last)/1000)||0; G.last=t; update(dt); render(); G.raf=requestAnimationFrame(frame); }

  // ---------- control ----------
  function start(){ if(G.running)return; resize();
    G.running=true; $("#startBtn").textContent="⏸ 중지";
    G.cols=[]; G.beam=null; G.fx=[]; G.laneSeq=0; G.respawn=0; G.wrong=0;
    $("#over").classList.remove("show");
    placePlayerAtClock(G.clock); // 캐릭터를 선택한 시작 위치에 배치
    newRings(); spawnLane(G.clock);
    G.last=now(); G.raf=requestAnimationFrame(frame);
  }
  function stop(){ G.running=false; $("#startBtn").textContent="▶ 시작"; cancelAnimationFrame(G.raf); render(); }
  function gameOver(){ G.running=false; $("#startBtn").textContent="▶ 시작"; cancelAnimationFrame(G.raf); render(); $("#over").classList.add("show"); }

  // ---------- input ----------
  document.addEventListener("keydown",e=>{ if(!G.running)return;
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault(); keys.add(e.key); });
  document.addEventListener("keyup",e=>keys.delete(e.key));
  function ptPos(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(S/r.width), y:(e.clientY-r.top)*(S/r.height)}; }
  let pdown=false;
  cv.addEventListener("pointerdown",e=>{ if(!G.running)return; pdown=true; const p=ptPos(e); G.player.x=p.x;G.player.y=p.y;
    if(cv.setPointerCapture)try{cv.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  cv.addEventListener("pointermove",e=>{ if(!G.running||!pdown)return; const p=ptPos(e); G.player.x=p.x;G.player.y=p.y; e.preventDefault(); });
  window.addEventListener("pointerup",()=>{ pdown=false; });

  $("#clock").addEventListener("change",e=>{ G.clock=+e.target.value; if(G.running){G.cols=[];G.respawn=0;G.beam=null;placePlayerAtClock(G.clock);} });
  $("#startBtn").addEventListener("click",()=>G.running?stop():start());
  $("#resetBtn").addEventListener("click",()=>{ stop(); G.cols=[];G.beam=null;G.fx=[]; G.wrong=0; $("#over").classList.remove("show"); newRings(); render(); });
  $("#retryBtn").addEventListener("click",()=>start());

  // ---------- init ----------
  resize(); newRings(); render();
  // debug handles
  G._dbg=()=>({cx,cy,S,arenaR,bossR,arrival:arrival(),laneCount:laneCount(),COMMIT,ENTER_DELAY,ARM_TIME,LOCK_FRAC,wrong:G.wrong});
  G._placeAt=(clock,dist)=>{const a=clockAngle(clock);G.player.x=cx+Math.cos(a)*dist;G.player.y=cy+Math.sin(a)*dist;};
  G._orbRad=orbRad;
  G._solvable=laneSolvable;
  G._tick=()=>{ G.beam={t:ARM_TIME,ang:Math.atan2(G.player.y-cy,G.player.x-cx),locked:true}; explode(); };
})();
</script>
</body>
</html>
